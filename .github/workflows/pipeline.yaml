name: ADP Pipeline

on:
  push:
    branches:
      -main

jobs:

  register-dataset:
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: "3.10"

      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install -r Stocknews_project/requirements.txt

      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: python Stocknews_project/model_build_files/data_registry.py


  data-preparation:
    
    runs-on: ubuntu-latest
    needs: register-dataset

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-puthon@v4
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install -r Stocknews_project/requirements.txt

      - name: Run Data Preparation
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: python Stocknews_project/model_build_files/prep.py


  model-training:
    runs-on: ubuntu-latest
    needs: data-preparation

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Stocknews_project/requirements.txt

      - name: Model Building
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: python Stocknews_project/model_build_files/train.py


  deploy-hosting:
    name: Deploy Hosting
    runs-on: ubuntu-latest
    needs: [register-dataset, data-preparation, model-training]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
        
      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install -r Stocknews_project/requirements.txt

      - name: Push files to Frontend Hugging Face Space
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: python Stocknews_project/web_host/hosting.py
